<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Yaride Admin{% endblock %}</title>
    <link rel="stylesheet" href="/admin/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
{% if admin %}
<header class="topbar">
    <nav class="nav">
        <a class="brand" href="/admin">Yaride Admin</a>
        <a class="{{ 'on' if active == 'dashboard' }}" href="/admin">Сводка</a>
        <a class="{{ 'on' if active == 'drivers' }}" href="/admin/drivers/pending">Водители (ВУ)</a>
        <a class="{{ 'on' if active == 'profile_requests' }}" href="/admin/profile-requests">Запросы на изменение профиля</a>
        <a class="{{ 'on' if active == 'users' }}" href="/admin/users">Пользователи</a>
        <a class="{{ 'on' if active == 'metrics' }}" href="/admin/metrics">Метрики</a>
    </nav>
    <div class="user">
        <a class="{{ 'on' if active == 'account' }}" href="/admin/account">{{ admin }}</a>
        <a href="/admin/logout">Выйти</a>
    </div>
</header>
{% endif %}
<main class="content">
    {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
    {% if msg %}<div class="flash ok">{{ msg }}</div>{% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
